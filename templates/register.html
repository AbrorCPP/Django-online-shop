{% extends "base.html" %}
{% block content %}

<form method = "POST" action = "/register/" class="container d-flex justify-content-center align-items-center pt-5" style="min-height: 300px;">
    {% csrf_token %}
    <div class="card p-4 shadow-sm w-100" style="max-width: 400px;">
        <h3 class="text-center mb-4">Register</h3>
        
        {% if messages %}
        <div class = "messages">
            {% for message in messages %}
                <div class="font-weight-bold text-danger" role="alert">
                {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="mb-3">
            <input name = "username" type="text" class="form-control" placeholder="Username" aria-label="Username">
        </div>
        
        <div class="mb-3">
            <input name = "password1" type="password" class="form-control" placeholder="Password" aria-label="Password">
        </div>

         <div class="mb-3">
            <input name = "password2" type="password" class="form-control" placeholder="RepeatPassword" aria-label="Password">
        </div>
        
        <div class="d-grid">
            <button type="submit" class="btn btn-primary">Login</button>
        </div>
        <a href="/login/"> already has an account !</a>
    </div>
</form>

{% endblock content %}
